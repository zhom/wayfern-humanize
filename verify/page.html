<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>wayfern-humanizer verification</title>
<style>
    body { font-family: sans-serif; margin: 0; padding: 20px; }
    .spacer { height: 2400px; background: linear-gradient(#fafafa, #ddd); }
    #target {
        position: relative;
        width: 220px; height: 60px;
        margin: 80px auto;
        background: #f0f0f0;
        border: 1px solid #888;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
    }
    #footer {
        margin: 40px auto;
        padding: 20px;
        background: #ccc;
        text-align: center;
    }
    #login {
        margin: 40px auto;
        max-width: 320px;
    }
    #login input { display: block; width: 100%; padding: 8px; margin: 6px 0; box-sizing: border-box; }
</style>
</head>
<body>
    <h1>Wayfern humanizer verification page</h1>

    <div id="login">
        <input id="email" type="email" placeholder="email" />
        <input id="password" type="password" placeholder="password" />
        <button id="submit">Submit</button>
    </div>

    <div id="target">click me</div>
    <div class="spacer"></div>
    <div id="footer">footer</div>
</body>
</html>
